name: Ping Supabase to Prevent Pause

on:
  schedule:
    # Runs at 12:00 UTC (21:00 JST) every Tuesday and Friday
    # Supabase free projects pause after 7 days of inactivity.
    - cron: '0 12 * * 2,5'
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Kif2Gif Production Endpoint
        env:
          # In your GitHub repo settings (Settings > Secrets and variables > Actions), 
          # add VERCEL_PROJECT_DOMAIN secret (e.g., kif2gif-web.vercel.app)
          VERCEL_DOMAIN: ${{ secrets.VERCEL_PROJECT_DOMAIN }}
        run: |
          if [ -z "$VERCEL_DOMAIN" ]; then
            echo "VERCEL_PROJECT_DOMAIN secret is not set. Skipping ping."
            exit 0
          fi
          echo "Pinging https://$VERCEL_DOMAIN/api/ping ..."
          curl -f -s "https://$VERCEL_DOMAIN/api/ping"
          echo -e "\nPing completed successfully!"
